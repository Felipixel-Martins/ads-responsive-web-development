<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade - Normal vs Hover</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #eef4fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 40px;
            padding: 40px 50px;
            box-shadow: 0 20px 30px rgba(0,20,40,0.15);
            max-width: 800px;
            width: fit-content;
        }

        .titulo {
            font-size: 1.8rem;
            font-weight: 600;
            color: #0c334e;
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 3px solid #b3d9f0;
            text-align: center;
        }

        .menu-wrapper {
            display: flex;
            gap: 60px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .menu-box {
            min-width: 200px;
        }

        .menu-label {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1a4b6e;
            margin-bottom: 20px;
            text-align: center;
        }

        .menu-list {
            list-style: none;
            background: #f0f7ff;
            border-radius: 30px;
            padding: 25px 20px;
            box-shadow: inset 0 2px 6px rgba(255,255,255,0.8), 0 6px 12px rgba(47,91,128,0.2);
            border: 1px solid #d1e6f9;
        }

        .menu-list li {
            margin: 15px 0;
            text-align: center;
        }

        .menu-list a {
            display: inline-block;
            padding: 10px 35px;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: 600;
            color: #0d3e5c;
            background: #d9eaf9;
            border-radius: 50px;
            box-shadow: 0 4px 8px #b0c8dc, 0 1px 3px white inset;
            border: 1px solid #eaf3fd;
            transition: all 0.25s ease;
            min-width: 100px;
        }

        /* NORMAL - apenas hover individual nos links */
        .menu-box:first-child .menu-list a:hover {
            background: #c5def5;
            transform: scale(1.02);
            box-shadow: 0 8px 12px #99b8d4;
        }

        /* QUANDO PASSAR O MOUSE - efeito em toda a caixa */
        .menu-box.hover-effect:hover .menu-list a {
            background: #1f5f8b;
            color: white;
            border-color: #c0e1ff;
            box-shadow: 0 10px 18px -6px #0d3148, 0 0 0 2px #ddf0ff inset;
            transform: scale(1.05);
        }

        /* Efeito extra ao passar no link individual dentro do hover */
        .menu-box.hover-effect .menu-list a:hover {
            background: #2c74a5;
            box-shadow: 0 12px 20px -8px #082433;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="titulo">Atividade da semana - 13/03/2026</div>

        <div class="menu-wrapper">
            <!-- NORMAL -->
            <div class="menu-box">
                <div class="menu-label">Normal</div>
                <ul class="menu-list">
                    <li><a href="#">1</a></li>
                    <li><a href="#">2</a></li>
                    <li><a href="#">3</a></li>
                </ul>
            </div>

            <!-- QUANDO PASSAR O MOUSE -->
            <div class="menu-box hover-effect">
                <div class="menu-label">Quando passar o mouse</div>
                <ul class="menu-list">
                    <li><a href="#">1</a></li>
                    <li><a href="#">2</a></li>
                    <li><a href="#">3</a></li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
